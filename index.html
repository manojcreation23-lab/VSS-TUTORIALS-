<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSS Tutorials</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
}

/* NAVBAR */
nav{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px 25px;
  border-radius:30px;
  display:flex;
  align-items:center;
  gap:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
nav h2{
  color:#111;
  margin:0;
  font-size:16px;
}
nav .menu{
  margin-left:20px;
  font-size:20px;
  color:#333;
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1523240795612-9a054b0db644') center/cover no-repeat;
  display:flex;
  align-items:center;
  padding:0 80px;
  position:relative;
}

/* OVERLAY */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

/* CONTENT */
.hero-content{
  position:relative;
  max-width:600px;
}

.hero h1{
  font-size:55px;
  line-height:1.2;
  margin-bottom:20px;
}

.hero p{
  font-size:18px;
  margin-bottom:25px;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:15px;
}

.btn{
  padding:12px 25px;
  border-radius:25px;
  text-decoration:none;
  font-weight:500;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.btn-secondary{
  background:white;
  color:#333;
}

/* TRUST */
.trust{
  margin-top:25px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
}

.trust img{
  width:30px;
  height:30px;
  border-radius:50%;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>VSS Tutorials</h2>
  <div class="menu">☰</div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Top Coaching Center in Bangalore for Grades 8–12</h1>
    <p>Build strong concepts, score higher, and achieve your academic goals.</p>

    <div class="buttons">
      <a href="#" class="btn btn-primary">Enroll Now</a>
      <a href="#" class="btn btn-secondary">Contact Us</a>
    </div>

    <div class="trust">
      <img src="https://randomuser.me/api/portraits/men/1.jpg">
      <img src="https://randomuser.me/api/portraits/women/2.jpg">
      <img src="https://randomuser.me/api/portraits/men/3.jpg">
      <span>Trusted by 500+ students</span>
    </div>
  </div>
</div>

</body>
</html>
