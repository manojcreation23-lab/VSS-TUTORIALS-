<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSS Tutorials</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial;
  background:#0f172a;
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#020617;
}
nav h2{color:#3b82f6;}
nav a{color:white;margin:0 10px;text-decoration:none;}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px;
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
}
.hero h1{font-size:50px;}
.btn{
  background:white;
  color:#1e3a8a;
  padding:12px 25px;
  border-radius:6px;
  text-decoration:none;
}

/* SECTION */
section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}
section.show{
  opacity:1;
  transform:translateY(0);
}

h2{text-align:center;margin-bottom:30px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

/* FORM */
form input, form textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}
form button{
  background:#2563eb;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
  text-decoration:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#020617;
}
</style>

</head>

<body>

<nav>
  <h2>VSS Tutorials</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Courses</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="hero">
  <h1>Learn Smarter. Score Better.</h1>
  <p>Top Coaching in Bangalore</p>
  <a class="btn" href="#contact">Book Demo</a>
</div>

<section>
  <h2>Courses</h2>
  <div class="grid">
    <div class="card">8th - 10th</div>
    <div class="card">PU Coaching</div>
    <div class="card">Maths, Science</div>
  </div>
</section>

<section>
  <h2>Faculty</h2>
  <div class="grid">
    <div class="card">Rajesh Kumar - Maths</div>
    <div class="card">Priya Sharma - Science</div>
    <div class="card">Arjun Reddy - English</div>
  </div>
</section>

<section id="contact">
  <h2>Enquiry Form</h2>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="tel" placeholder="Phone Number" required>
    <textarea placeholder="Message"></textarea>
    <button type="submit">Submit</button>
  </form>
</section>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<footer>
  © 2026 VSS Tutorials
</footer>

<script>
const sections = document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
  sections.forEach(sec=>{
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
});
</script>

</body>
</html>
